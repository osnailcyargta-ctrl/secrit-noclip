name: Build Geode Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-win:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: geode-sdk/build-geode-mod@main
        with:
          sdk: nightly
          target: Win64
          build-config: Release
      - uses: actions/upload-artifact@v4
        with:
          name: Windows
          path: ${{ steps.build.outputs.build-output }}

  build-android32:
    name: Build Android32
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: geode-sdk/build-geode-mod@main
        with:
          sdk: nightly
          target: Android32
          build-config: Release
      - uses: actions/upload-artifact@v4
        with:
          name: Android32
          path: ${{ steps.build.outputs.build-output }}

  build-android64:
    name: Build Android64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: geode-sdk/build-geode-mod@main
        with:
          sdk: nightly
          target: Android64
          build-config: Release
      - uses: actions/upload-artifact@v4
        with:
          name: Android64
          path: ${{ steps.build.outputs.build-output }}
