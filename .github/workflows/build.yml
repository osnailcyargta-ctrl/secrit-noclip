name: Build Geode Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        config:
          - name: Windows
            os: windows-latest
            platform: win
          - name: Android32
            os: ubuntu-latest
            platform: android32
          - name: Android64
            os: ubuntu-latest
            platform: android64

    name: Build ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Geode SDK (Windows)
        if: matrix.config.os == 'windows-latest'
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/geode-sdk/geode/releases/latest/download/geode-installer-win.exe" -OutFile "geode-installer.exe"
          Start-Process -FilePath ".\geode-installer.exe" -ArgumentList "--unattended" -Wait
          echo "GEODE_SDK=$env:LOCALAPPDATA\GeodeSDK" >> $env:GITHUB_ENV

      - name: Setup Geode SDK (Linux/Android)
        if: matrix.config.os == 'ubuntu-latest'
        run: |
          curl -L "https://github.com/geode-sdk/geode/releases/latest/download/geode-installer-linux" -o geode-installer
          chmod +x geode-installer
          ./geode-installer --unattended
          echo "GEODE_SDK=$HOME/.local/share/geode-sdk" >> $GITHUB_ENV

      - name: Build mod
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: nightly
          target: ${{ matrix.config.platform }}
          build-config: Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.name }}-build
          path: '*.geode'

  package:
    name: Package Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -name "*.geode" | sort

      - name: Upload combined
        uses: actions/upload-artifact@v4
        with:
          name: all-platforms
          path: artifacts/**/*.geode
